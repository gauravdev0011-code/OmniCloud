<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OmniCloud</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>OmniCloud</h1>
        <p>Real-time collaborative tasks</p>
    </header>

    <div class="card">
        <input id="title" placeholder="Task title">
        <input id="desc" placeholder="Description">
        <button onclick="createTask()">Add Task</button>
    </div>

    <div class="card">
        <h2>Tasks</h2>
        <ul id="tasks"></ul>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
