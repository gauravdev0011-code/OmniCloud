server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:omniclouddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  main:
    allow-bean-definition-overriding: true

jwt:
  secret: omnicloud-super-secret-key-that-is-at-least-256-bits-long-for-hs256
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics